<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SubStreak Overlay</title>
    <style>
      @font-face { font-family: 'Saira'; font-weight: 400; src: url('/fonts/saira-400.woff2') format('woff2'); }
      @font-face { font-family: 'Saira'; font-weight: 600; src: url('/fonts/saira-600.woff2') format('woff2'); }
      @font-face { font-family: 'Saira Condensed'; font-weight: 300; src: url('/fonts/scond-300.woff2') format('woff2'); }
      @font-face { font-family: 'Saira Condensed'; font-weight: 500; src: url('/fonts/scond-500.woff2') format('woff2'); }

      :root { --accent: #9147ff; --good: #43d6a0; --muted: #74757b; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
      body { font-family: 'Saira', system-ui, sans-serif; color: #fff; }

      #stage {
        position: absolute;
        transform-origin: center center;
        transition: left 0.15s ease, top 0.15s ease, transform 0.15s ease, opacity 0.2s ease;
        will-change: left, top, transform;
      }

      /* Widget */
      .widget {
        display: inline-flex;
        align-items: stretch;
        background: rgba(13, 13, 15, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        backdrop-filter: blur(10px);
        overflow: hidden;
      }
      .cell { padding: 15px 22px; }
      .sep { width: 1px; background: rgba(255, 255, 255, 0.08); }
      .label { font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
      .figure { font-family: 'Saira Condensed'; font-weight: 300; display: flex; align-items: baseline; gap: 5px; margin-top: 4px; }
      .num { font-size: 50px; line-height: 0.9; font-variant-numeric: tabular-nums; }
      .den { font-size: 22px; color: var(--muted); }
      .unit { font-family: 'Saira'; font-weight: 500; font-size: 15px; text-transform: uppercase; color: var(--muted); }
      .bar { height: 5px; width: 200px; background: rgba(255, 255, 255, 0.09); border-radius: 2px; margin-top: 11px; overflow: hidden; }
      .fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.5s cubic-bezier(0.22,1,0.36,1); }
      .cap { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: 9px; }
      .streak-cell { text-align: center; min-width: 110px; display: flex; flex-direction: column; }
      .streak-cell .cap { margin-top: auto; }
      .met .num, .met .cap { color: var(--good); }
      .met .fill { background: var(--good); }

      /* Custom text */
      #text {
        font-family: 'Saira Condensed';
        font-weight: 500;
        white-space: pre;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.65);
        line-height: 1.1;
      }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="widget" class="widget">
        <div class="cell">
          <div class="label">Daily goal</div>
          <div class="figure"><span class="num" id="cur">0</span><span class="den">/<span id="tgt">1</span></span></div>
          <div class="bar"><div class="fill" id="fill"></div></div>
          <div class="cap" id="cap">Offline</div>
        </div>
        <div class="sep"></div>
        <div class="cell streak-cell">
          <div class="label">Streak</div>
          <div class="figure" style="justify-content:center"><span class="num" id="streak">0</span><span class="unit" id="unit">days</span></div>
          <div class="cap" id="best">Best 0</div>
        </div>
      </div>
      <div id="text" class="hidden"></div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id)
      const stage = $('stage'), widget = $('widget'), text = $('text')

      function tpl(t, d) {
        return String(t)
          .replace(/\{current\}/g, d.current ?? 0).replace(/\{target\}/g, d.target ?? 1)
          .replace(/\{remaining\}/g, d.remaining ?? 0).replace(/\{pct\}/g, d.pct ?? 0)
          .replace(/\{streak\}/g, d.streak ?? 0).replace(/\{best\}/g, d.best ?? 0)
      }

      async function refresh() {
        try {
          const d = await (await fetch('/state', { cache: 'no-store' })).json()
          const s = d.settings || { x: 50, y: 88, scale: 100, opacity: 100, mode: 'widget', text: {} }

          stage.style.left = (s.x ?? 50) + '%'
          stage.style.top = (s.y ?? 88) + '%'
          stage.style.transform = `translate(-50%, -50%) scale(${(s.scale ?? 100) / 100})`
          stage.style.opacity = (s.opacity ?? 100) / 100

          if (s.mode === 'text') {
            widget.classList.add('hidden'); text.classList.remove('hidden')
            const ts = s.text || {}
            text.textContent = tpl(ts.template || '', d)
            text.style.fontSize = (ts.fontSize || 38) + 'px'
            text.style.color = ts.color || '#ffffff'
            text.style.textAlign = ts.align || 'center'
          } else {
            text.classList.add('hidden'); widget.classList.remove('hidden')
            $('cur').textContent = d.current ?? 0
            $('tgt').textContent = d.target ?? 1
            $('fill').style.width = (d.pct ?? 0) + '%'
            $('streak').textContent = d.streak ?? 0
            $('unit').textContent = (d.streak === 1) ? 'day' : 'days'
            $('best').textContent = 'Best ' + (d.best ?? 0)
            $('cap').textContent = d.goalHit ? 'Goal met'
              : (d.current > 0 ? (d.remaining + ' more to go') : (d.live ? 'Waiting for subs' : 'Offline'))
            widget.classList.toggle('met', !!d.goalHit)
          }
        } catch (_) {}
      }
      refresh()
      setInterval(refresh, 1200)
    </script>
  </body>
</html>
