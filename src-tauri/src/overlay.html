<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SubStreak Overlay</title>
    <style>
      :root {
        --accent: #7c5cff;
        --accent-2: #00d4ff;
        --good: #34d399;
        --flame: #ff7a3c;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: transparent; overflow: hidden; }
      body {
        font-family: 'Inter', system-ui, 'Segoe UI', sans-serif;
        color: #fff;
        padding: 16px;
      }
      .wrap {
        display: inline-flex;
        flex-direction: column;
        gap: 10px;
        padding: 18px 22px;
        border-radius: 16px;
        background: rgba(12, 14, 20, 0.82);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
        min-width: 280px;
      }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 18px; }
      .label {
        font-size: 12px;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
      }
      .goal-num { font-size: 34px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
      .goal-num .target { color: rgba(255, 255, 255, 0.5); font-size: 22px; }
      .bar { height: 10px; border-radius: 999px; background: rgba(255, 255, 255, 0.1); overflow: hidden; }
      .fill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .streak { display: flex; align-items: baseline; gap: 8px; }
      .streak .flame { font-size: 22px; }
      .streak .days { font-size: 26px; font-weight: 800; line-height: 1; }
      .streak .unit { color: rgba(255, 255, 255, 0.55); font-size: 14px; }
      .hit .goal-num { color: var(--good); }
      .hit .fill { background: linear-gradient(90deg, var(--good), #6ee7b7); }
      .pill {
        font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
        padding: 3px 9px; border-radius: 999px;
        color: var(--good); border: 1px solid rgba(52, 211, 153, 0.4);
        background: rgba(52, 211, 153, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="wrap" id="wrap">
      <div class="row">
        <span class="label">Daily sub goal</span>
        <span class="pill" id="hitPill" style="display:none">GOAL HIT</span>
      </div>
      <div class="goal-num"><span id="cur">0</span><span class="target">/<span id="tgt">1</span></span></div>
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div class="row" style="margin-top:4px">
        <span class="label">Streak</span>
        <div class="streak"><span class="flame">🔥</span><span class="days" id="streak">0</span><span class="unit" id="unit">days</span></div>
      </div>
    </div>
    <script>
      async function refresh() {
        try {
          const res = await fetch('/state', { cache: 'no-store' })
          const s = await res.json()
          const wrap = document.getElementById('wrap')
          document.getElementById('cur').textContent = s.current ?? 0
          document.getElementById('tgt').textContent = s.target ?? 1
          document.getElementById('fill').style.width = (s.pct ?? 0) + '%'
          document.getElementById('streak').textContent = s.streak ?? 0
          document.getElementById('unit').textContent = (s.streak === 1) ? 'day' : 'days'
          document.getElementById('hitPill').style.display = s.goalHit ? '' : 'none'
          wrap.classList.toggle('hit', !!s.goalHit)
        } catch (_) { /* server may not be ready yet */ }
      }
      refresh()
      setInterval(refresh, 1500)
    </script>
  </body>
</html>
