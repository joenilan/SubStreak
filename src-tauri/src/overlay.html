<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SubStreak Overlay</title>
    <style>
      @font-face { font-family: 'Saira'; font-weight: 400; src: url('/fonts/saira-400.woff2') format('woff2'); }
      @font-face { font-family: 'Saira'; font-weight: 600; src: url('/fonts/saira-600.woff2') format('woff2'); }
      @font-face { font-family: 'Saira Condensed'; font-weight: 300; src: url('/fonts/scond-300.woff2') format('woff2'); }
      @font-face { font-family: 'Saira Condensed'; font-weight: 500; src: url('/fonts/scond-500.woff2') format('woff2'); }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
      body { font-family: 'Saira', system-ui, sans-serif; color: #fff; }

      /* Grouped text block */
      .group {
        position: absolute;
        transform-origin: center center;
        display: flex;
        white-space: nowrap;
        transition: left 0.15s ease, top 0.15s ease, transform 0.15s ease, opacity 0.2s ease;
        will-change: left, top, transform;
      }

      /* A single line (daily goal / streak / custom text) */
      .line {
        font-family: 'Saira Condensed';
        font-weight: 500;
        white-space: nowrap;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.65);
        line-height: 1.15;
      }
      .line.float {
        position: absolute;
        transform-origin: center center;
        transition: left 0.15s ease, top 0.15s ease, transform 0.15s ease, opacity 0.2s ease;
        will-change: left, top, transform;
      }

      /* Goal-hit celebration */
      #celebrate {
        position: absolute;
        transform: translate(-50%, -50%);
        pointer-events: none;
        opacity: 0;
        z-index: 10;
      }
      #celebrate.play { animation: goalpop 2.4s ease forwards; }
      #celebrate .goal {
        font-family: 'Saira Condensed';
        font-weight: 500;
        font-size: 72px;
        line-height: 1;
        letter-spacing: 0.04em;
        color: #43d6a0;
        text-shadow: 0 0 18px rgba(67, 214, 160, 0.7), 0 2px 10px rgba(0, 0, 0, 0.65);
      }
      @keyframes goalpop {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
        12% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
        70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
      }
      /* Glow pulse on the lines — filter only, so positioned/rotated lines aren't disturbed. */
      #root.celebrating .line { animation: linehit 0.9s ease; }
      @keyframes linehit {
        0%, 100% { filter: none; }
        35% { filter: drop-shadow(0 0 14px rgba(67, 214, 160, 0.95)) brightness(1.3); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="celebrate"></div>

    <script>
      const ALIGN_FLEX = { left: 'flex-start', center: 'center', right: 'flex-end' }

      function tpl(t, d) {
        return String(t)
          .replace(/\{current\}/g, d.current ?? 0).replace(/\{target\}/g, d.target ?? 1)
          .replace(/\{remaining\}/g, d.remaining ?? 0).replace(/\{pct\}/g, d.pct ?? 0)
          .replace(/\{streak\}/g, d.streak ?? 0).replace(/\{best\}/g, d.best ?? 0)
      }

      function lineEl(el, d) {
        const div = document.createElement('div')
        div.className = 'line'
        div.style.fontSize = (el.fontSize || 38) + 'px'
        div.style.color = el.color || '#ffffff'
        div.textContent = tpl(el.template || '', d)
        return div
      }

      function render(d) {
        const root = document.getElementById('root')
        root.innerHTML = ''
        const s = d.settings || {}
        const g = s.group || { grouped: true, x: 50, y: 88, scale: 100, rotation: 0, direction: 'vertical', align: 'center', gap: 8 }
        const els = (s.elements || []).filter((e) => e.visible)
        const opacity = (s.opacity ?? 100) / 100

        if (g.grouped) {
          const box = document.createElement('div')
          box.className = 'group'
          box.style.left = (g.x ?? 50) + '%'
          box.style.top = (g.y ?? 88) + '%'
          box.style.transform = `translate(-50%, -50%) scale(${(g.scale ?? 100) / 100}) rotate(${g.rotation ?? 0}deg)`
          box.style.flexDirection = g.direction === 'vertical' ? 'column' : 'row'
          box.style.alignItems = ALIGN_FLEX[g.align || 'center']
          box.style.gap = (g.gap ?? 8) + 'px'
          box.style.opacity = opacity
          for (const el of els) {
            const l = lineEl(el, d)
            l.style.textAlign = g.align || 'center'
            box.appendChild(l)
          }
          root.appendChild(box)
        } else {
          for (const el of els) {
            const l = lineEl(el, d)
            l.classList.add('float')
            l.style.left = (el.x ?? 50) + '%'
            l.style.top = (el.y ?? 50) + '%'
            l.style.transform = `translate(-50%, -50%) scale(${(el.scale ?? 100) / 100}) rotate(${el.rotation ?? 0}deg)`
            l.style.opacity = opacity
            root.appendChild(l)
          }
        }
      }

      let lastCelebrate = null
      let celTimer = null
      function handleCelebrate(d) {
        const at = d.celebrateAt || 0
        if (!at) return
        if (lastCelebrate === null) { lastCelebrate = at; return } // ignore first load
        if (at === lastCelebrate) return
        lastCelebrate = at
        if (Date.now() - at > 8000) return // stale, don't replay on a late poll

        const root = document.getElementById('root')
        const cel = document.getElementById('celebrate')
        const g = (d.settings && d.settings.group) || { x: 50, y: 50 }
        cel.style.left = (g.x ?? 50) + '%'
        cel.style.top = Math.max(6, (g.y ?? 50) - 12) + '%'
        cel.innerHTML = '<div class="goal">GOAL!</div>'

        root.classList.remove('celebrating'); void root.offsetWidth; root.classList.add('celebrating')
        cel.classList.remove('play'); void cel.offsetWidth; cel.classList.add('play')
        clearTimeout(celTimer)
        celTimer = setTimeout(() => {
          root.classList.remove('celebrating')
          cel.classList.remove('play')
          cel.innerHTML = ''
        }, 2600)
      }

      let last = ''
      async function refresh() {
        try {
          const body = await (await fetch('/state', { cache: 'no-store' })).text()
          if (body === last) return
          last = body
          const d = JSON.parse(body)
          render(d)
          handleCelebrate(d)
        } catch (_) {}
      }
      refresh()
      setInterval(refresh, 1200)
    </script>
  </body>
</html>
